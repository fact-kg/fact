<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Algorithm Viewer — Fact KG</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    function toggleTheme() {
      var h = document.documentElement;
      var c = h.getAttribute('data-theme');
      var n = c === 'dark' ? 'light' : c === 'light' ? 'dark' :
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'light' : 'dark');
      h.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
    }
    (function() {
      var s = localStorage.getItem('theme');
      if (s) document.documentElement.setAttribute('data-theme', s);
    })();
  </script>
  <style>
    #diagram-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      background: var(--pico-background-color);
      margin-bottom: 1em;
    }
  </style>
</head>
<body>
  <header class="container">
    <nav>
      <ul><li><strong><a href="/">Fact KG</a></strong></li></ul>
      <ul>
        <li><a href="#" onclick="toggleTheme();return false">Toggle theme</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    <h1>Algorithm Viewer</h1>

    <form method="get" id="search-form">
      <div class="grid">
        <div style="grid-column: span 2; position: relative;">
          <label for="fact">Algorithm fact path</label>
          <input type="text" name="fact" id="fact" value="{{ fact_path }}"
                 placeholder="Type to search..." autocomplete="off"
                 oninput="searchFacts(this.value)">
          <ul id="suggestions" style="
            position: absolute; z-index: 10; width: 100%;
            background: var(--pico-background-color);
            border: 1px solid var(--pico-muted-border-color);
            border-radius: 4px; margin: 0; padding: 0;
            list-style: none; max-height: 200px; overflow-y: auto;
            display: none;
          "></ul>
        </div>
        <div>
          <label>&nbsp;</label>
          <button type="submit">Show</button>
        </div>
      </div>
    </form>
    <script>
      var searchTimer = null;
      function searchFacts(q) {
        clearTimeout(searchTimer);
        var list = document.getElementById('suggestions');
        if (q.length < 2) { list.style.display = 'none'; return; }
        searchTimer = setTimeout(function() {
          fetch('/search?q=' + encodeURIComponent(q), {headers: {'Accept': 'application/json'}})
            .then(function(r) { return r.json(); })
            .then(function(results) {
              list.innerHTML = '';
              results.slice(0, 10).forEach(function(r) {
                var li = document.createElement('li');
                li.textContent = r.path;
                li.style.padding = '6px 10px';
                li.style.cursor = 'pointer';
                li.onmousedown = function() {
                  document.getElementById('fact').value = r.path;
                  list.style.display = 'none';
                  document.getElementById('search-form').submit();
                };
                list.appendChild(li);
              });
              list.style.display = results.length ? 'block' : 'none';
            });
        }, 200);
      }
      document.getElementById('fact').addEventListener('blur', function() {
        setTimeout(function() { document.getElementById('suggestions').style.display = 'none'; }, 200);
      });
    </script>

    {% if error %}
    <p><mark>{{ error }}</mark></p>
    {% endif %}

    {% if description %}
    <p><strong>{{ description }}</strong></p>
    {% endif %}

    {% if diagram_data %}
    <div id="diagram-container"></div>

    <script>
      var data = {{ diagram_data | tojson }};
      var pad = 40;
      var svgW = data.width + pad * 2;
      var svgH = data.height + pad * 2;

      var svg = d3.select("#diagram-container")
        .append("svg")
        .attr("width", svgW)
        .attr("height", svgH);

      var defs = svg.append("defs");
      defs.append("marker")
        .attr("id", "arrowhead")
        .attr("viewBox", "0 0 10 7")
        .attr("refX", 10)
        .attr("refY", 3.5)
        .attr("markerWidth", 8)
        .attr("markerHeight", 6)
        .attr("orient", "auto")
        .append("polygon")
        .attr("points", "0 0, 10 3.5, 0 7")
        .attr("fill", "#666");

      var g = svg.append("g")
        .attr("transform", "translate(" + pad + "," + pad + ")");

      var colors = {
        rect: "#2196F3",
        diamond: "#FF9800",
        hexagon: "#9C27B0",
        rounded: "#4CAF50"
      };

      // edges
      var nodeMap = {};
      data.nodes.forEach(function(n) { nodeMap[n.id] = n; });

      data.edges.forEach(function(d) {
        var s = nodeMap[d.source], t = nodeMap[d.target];
        if (d.style === "loop") {
          // loop-back: go down from source, right, up, then left to target top
          var sx = s.x + s.width / 2;
          var sy = s.y + s.height;
          var tx = t.x + t.width / 2;
          var ty = t.y;
          var loopX = Math.max(s.x + s.width, t.x + t.width) + 40;
          var loopBottom = sy + 20;
          var loopTop = ty - 20;
          g.append("path")
            .attr("d", "M" + sx + "," + sy +
                        " L" + sx + "," + loopBottom +
                        " L" + loopX + "," + loopBottom +
                        " L" + loopX + "," + loopTop +
                        " L" + tx + "," + loopTop +
                        " L" + tx + "," + ty)
            .attr("fill", "none")
            .attr("stroke", "#999")
            .attr("stroke-width", 1.5)
            .attr("stroke-dasharray", "5,3")
            .attr("marker-end", "url(#arrowhead)");
        } else if (Math.abs(s.y - t.y) < 5) {
          // horizontal: same row, connect right to left
          var sx = s.x + s.width;
          var sy = s.y + s.height / 2;
          var tx = t.x;
          var ty = t.y + t.height / 2;
          g.append("line")
            .attr("x1", sx).attr("y1", sy)
            .attr("x2", tx).attr("y2", ty)
            .attr("stroke", "#666")
            .attr("stroke-width", 1.5)
            .attr("marker-end", "url(#arrowhead)");
        } else {
          // vertical: connect bottom to top
          g.append("line")
            .attr("x1", s.x + s.width / 2)
            .attr("y1", s.y + s.height)
            .attr("x2", t.x + t.width / 2)
            .attr("y2", t.y)
            .attr("stroke", "#666")
            .attr("stroke-width", 1.5)
            .attr("marker-end", "url(#arrowhead)");
        }
      });

      // edge labels
      data.edges.forEach(function(d) {
        if (!d.label) return;
        var s = nodeMap[d.source], t = nodeMap[d.target];
        var lx, ly;
        if (d.style === "loop") {
          lx = Math.max(s.x + s.width, t.x + t.width) + 45;
          ly = (s.y + s.height + t.y) / 2;
        } else if (Math.abs(s.y - t.y) < 5) {
          lx = (s.x + s.width + t.x) / 2;
          ly = s.y + s.height / 2 - 8;
        } else {
          lx = (s.x + s.width / 2 + t.x + t.width / 2) / 2 + 5;
          ly = (s.y + s.height + t.y) / 2;
        }
        g.append("text")
          .attr("x", lx).attr("y", ly)
          .attr("fill", "#666")
          .attr("font-size", "11px")
          .attr("font-style", "italic")
          .text(d.label);
      });

      // nodes
      var node = g.selectAll("g.node")
        .data(data.nodes)
        .enter()
        .append("g")
        .attr("class", "node")
        .attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });

      node.each(function(d) {
        var el = d3.select(this);
        var color = colors[d.type] || colors.rect;

        if (d.type === "diamond") {
          var cx = d.width / 2, cy = d.height / 2;
          el.append("polygon")
            .attr("points",
              cx + ",0 " + d.width + "," + cy + " " +
              cx + "," + d.height + " 0," + cy)
            .attr("fill", color)
            .attr("opacity", 0.85);
        } else if (d.type === "rounded") {
          el.append("rect")
            .attr("width", d.width)
            .attr("height", d.height)
            .attr("rx", d.height / 2)
            .attr("fill", color)
            .attr("opacity", 0.85);
        } else if (d.type === "hexagon") {
          var w = d.width, h = d.height, indent = 15;
          el.append("polygon")
            .attr("points",
              indent + ",0 " + (w - indent) + ",0 " +
              w + "," + (h / 2) + " " +
              (w - indent) + "," + h + " " +
              indent + "," + h + " " +
              "0," + (h / 2))
            .attr("fill", color)
            .attr("opacity", 0.85);
        } else {
          el.append("rect")
            .attr("width", d.width)
            .attr("height", d.height)
            .attr("rx", 4)
            .attr("fill", color)
            .attr("opacity", 0.85);
        }

        el.append("text")
          .attr("x", d.width / 2)
          .attr("y", d.height / 2)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "central")
          .attr("fill", "white")
          .attr("font-size", "11px")
          .attr("font-weight", "bold")
          .text(d.label);
      });
    </script>
    {% endif %}
  </main>
</body>
</html>
