{% extends "base.html" %}
{% block title %}Search — Fact KG{% endblock %}
{% block content %}
<h1>Search</h1>
<form action="/search" method="get">
  <input type="search" name="q" value="{{ query }}" placeholder="Search facts..." autofocus>
</form>
{% if query %}
<p>{{ results | length }} result(s) for "{{ query }}"</p>
  {% if results %}
  <ul>
    {% for r in results %}
    <li><a href="/fact/{{ r.path }}">{{ r.path }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}
{% endif %}
{% endblock %}
