- is: CLI tool
- has:
    description: |
      Command-line entry point for checking facts.
      Validates schema, referential integrity, and fact construction.
      Supports --all to check all facts and --roots for multiple root directories.
- has:
    source_file:
      type: str
      value: pysrc/check.py
- has:
    function_main:
      type: computer/sw/lang/python/function
      as:
        - computer/sw/lang/python/function:
            name:
              value: main
- has:
    function_check_one:
      type: app/org/igorlesik/fact/pysrc/checker/check_one
- has:
    function_check_all:
      type: app/org/igorlesik/fact/pysrc/checker/check_all
