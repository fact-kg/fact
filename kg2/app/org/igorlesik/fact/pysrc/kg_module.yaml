- is: Python module
- has:
    description: |
      Loads YAML fact files from multiple root directories into memory.
      Validates each fact against JSON Schema.
      Detects duplicate facts across roots.
- has:
    source_file:
      type: str
      value: pysrc/kg.py
- has:
    class_name:
      type: str
      value: Kg
- has:
    parent_class:
      type: computer/sw/lang/python/class
      as:
        - computer/sw/lang/python/class:
            name:
              value: KgIface
- has:
    method_load:
      type: computer/sw/lang/python/class_method
      as:
        - computer/sw/lang/python/class_method:
            name:
              value: load
- has:
    method_find_fact_file:
      type: computer/sw/lang/python/class_method
      as:
        - computer/sw/lang/python/class_method:
            name:
              value: find_fact_file
- has:
    method_validate_schema:
      type: computer/sw/lang/python/class_method
      as:
        - computer/sw/lang/python/class_method:
            name:
              value: validate_schema
- has:
    method_is_loaded:
      type: computer/sw/lang/python/class_method
      as:
        - computer/sw/lang/python/class_method:
            name:
              value: is_loaded
- has:
    method_get_fact:
      type: computer/sw/lang/python/class_method
      as:
        - computer/sw/lang/python/class_method:
            name:
              value: get_fact
- has:
    method_get_dict:
      type: computer/sw/lang/python/class_method
      as:
        - computer/sw/lang/python/class_method:
            name:
              value: get_dict
